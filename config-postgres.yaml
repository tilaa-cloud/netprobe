# Netprobe Exporter Configuration - PostgreSQL
# Connect to PostgreSQL running in Docker

exporter:
  listen_address: "0.0.0.0"
  listen_port: 9090

  ping_interval_seconds: 30            # Short interval for testing
  batch_size: 10
  max_parallel_workers: 4

  icmp:
    enabled: true
    timeout_ms: 5000
    count: 1

  arp:
    enabled: true
    timeout_ms: 5000

# PostgreSQL database configuration
database:
  type: "postgresql"
  host: "localhost"
  port: 5432
  database: "network_monitoring"
  user: "exporter_user"
  password: "exporter_password"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime_seconds: 600

  # Query to fetch targets from PostgreSQL
  query: |
    SELECT destination_ip, customer_id, vlan, pod, host
    FROM targets
    WHERE active = true
    ORDER BY destination_ip

  # Dimension labels matching the query columns (excluding destination_ip which is the primary key)
  dimension_labels:
    - customer_id
    - vlan
    - pod
    - host

target_refresh:
  interval_seconds: 60
  on_startup: true

logging:
  level: "info"
  format: "json"
